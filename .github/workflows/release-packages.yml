name: release-packages

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    verify:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  coverage: none
            - name: Validate and test starter
              run: |
                  composer install --no-interaction --prefer-dist
                  composer validate --strict
                  composer test

    package-and-release:
        runs-on: ubuntu-latest
        needs: verify
        permissions:
            contents: write
            packages: write
        steps:
            - uses: actions/checkout@v4
            - name: Build package archives
              run: |
                  mkdir -p dist
                  tar -czf dist/php-lite-${GITHUB_SHA}.tar.gz --exclude='.git' --exclude='vendor' .
            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: php-lite-${{ github.sha }}
                  path: dist/php-lite-${{ github.sha }}.tar.gz
            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  prerelease: false
                  files: |
                      dist/php-lite-${{ github.sha }}.tar.gz
                  generate_release_notes: true
            - name: Trigger Packagist update
              if: env.PACKAGIST_WEBHOOK_URL != ''
              env:
                  PACKAGIST_WEBHOOK_URL: ${{ secrets.PHP_LITE_PACKAGIST_WEBHOOK_URL }}
              run: curl -fsSL -X POST "$PACKAGIST_WEBHOOK_URL"
