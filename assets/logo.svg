<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EA5E9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- PHP brackets with Lite concept -->
  <!-- Left bracket -->
  <path d="M 40 50 L 60 50 L 60 70 L 45 70 L 45 130 L 60 130 L 60 150 L 40 150 Z" 
        fill="none" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Right bracket -->
  <path d="M 160 50 L 140 50 L 140 70 L 155 70 L 155 130 L 140 130 L 140 150 L 160 150 Z" 
        fill="none" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center dot pattern for "Lite" concept -->
  <!-- Three small circles representing simplicity -->
  <circle cx="100" cy="70" r="6" fill="url(#logoGradient)"/>
  <circle cx="100" cy="100" r="6" fill="url(#logoGradient)"/>
  <circle cx="100" cy="130" r="6" fill="url(#logoGradient)"/>
  
  <!-- Horizontal lines suggesting code/simplicity -->
  <line x1="75" y1="70" x2="100" y2="70" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="75" y1="100" x2="100" y2="100" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="75" y1="130" x2="100" y2="130" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <line x1="100" y1="70" x2="125" y2="70" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="125" y2="100" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="125" y2="130" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
</svg>
