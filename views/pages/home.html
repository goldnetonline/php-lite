<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Lite - Lightweight Web Framework</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1A1F35 50%, #0F172A 100%);
            color: #E2E8F0;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem 0;
            border-bottom: 1px solid rgba(6, 182, 212, 0.1);
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #06B6D4, #0EA5E9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        nav a {
            color: #CBD5E1;
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #06B6D4;
        }

        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(135deg, #F1F5F9 0%, #CBD5E1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
        }

        .hero p {
            font-size: 1.25rem;
            color: #94A3B8;
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 4rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #06B6D4, #0EA5E9);
            color: #0F172A;
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(6, 182, 212, 0.4);
        }

        .btn-secondary {
            background: rgba(6, 182, 212, 0.1);
            color: #06B6D4;
            border: 2px solid #06B6D4;
        }

        .btn-secondary:hover {
            background: rgba(6, 182, 212, 0.2);
            transform: translateY(-2px);
        }

        footer {
            padding: 3rem 0;
            border-top: 1px solid rgba(6, 182, 212, 0.1);
            text-align: center;
            color: #64748B;
            margin-top: auto;
        }

        footer p {
            font-size: 0.9rem;
        }

        .accent {
            color: #06B6D4;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1rem;
            }

            nav a {
                margin-left: 1rem;
            }

            .header-content {
                flex-wrap: wrap;
                gap: 1rem;
            }

            nav {
                width: 100%;
                order: 3;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">PHP Lite</div>
                <nav>
                    <a href="https://github.com/goldnetonline/php-lite" target="_blank">GitHub</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="container">
        <section class="hero">
            <div>
                <h1>Lightweight PHP <span class="accent">Web Framework</span></h1>
                <p>Fast, elegant, and simple. Build modern PHP applications without the complexity.</p>
                <div class="cta-buttons">
                    <button class="btn btn-primary" onclick="alert('Get started with: composer create-project goldnetonline/php-lite my-site')">Get Started</button>
                    <a href="https://github.com/goldnetonline/php-lite" target="_blank" class="btn btn-secondary">View on GitHub</a>
                </div>
            </div>
        </section>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 PHP Lite. Made with <span class="accent">❤️</span> for developers.</p>
        </div>
    </footer>
</body>
</html>
